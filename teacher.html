<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EZRA — לוח מורה</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f5f4ff;color:#1a1033}input,button{font:inherit}button{border:0;border-radius:12px;padding:10px 16px;font-weight:700;cursor:pointer}.primary{background:var(--tc,#4318D1);color:white}.ghost{background:#ede7ff;color:var(--tc,#4318D1)}.screen{min-height:100vh;padding:24px}.center{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1033,#4318D1)}.card{background:white;border-radius:20px;padding:24px;box-shadow:0 8px 28px #0002;margin-bottom:18px}.login{width:min(420px,94vw)}.tabs{display:flex;gap:8px}.tab{flex:1;background:#fff;border:2px solid #ddd6fe;color:#4318D1}.tab.active{background:var(--tc,#4318D1);color:white}input,select{width:100%;padding:11px;border:2px solid #ddd6fe;border-radius:12px;margin:8px 0}.err{display:none;background:#ffebee;color:#c62828;border-radius:10px;padding:8px;margin:8px 0}.top{display:none;background:var(--tc,#4318D1);color:white;padding:14px 20px;gap:12px;align-items:center}.logout{margin-right:auto;background:#fff2;color:white}.wrap{display:none;max-width:980px;margin:0 auto;padding:18px}.nav{display:flex;gap:8px;margin-bottom:18px}.nav button{flex:1;background:white;color:#4318D1}.nav button.active{background:var(--tc,#4318D1);color:white}.section{display:none}.section.active{display:block}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.list{max-height:420px;overflow:auto;border:2px solid #ddd6fe;border-radius:14px}.item{display:flex;gap:10px;align-items:center;padding:12px;border-bottom:1px solid #eee}.item:hover{background:#f8f7ff}.item b{flex:1}.badge{border-radius:999px;padding:4px 10px;background:#ede7ff;color:#4318D1;font-size:12px}table{width:100%;border-collapse:collapse;direction:ltr;text-align:left}td,th{border-bottom:1px solid #eee;padding:8px;font-size:13px}th{background:#f8f7ff}</style></head><body>
<section id="login" class="screen center"><div class="card login"><h1>🎓 לוח מורה</h1><div class="tabs"><button id="tab-ben" class="tab active" onclick="chooseTeacher('ben')">בן</button><button id="tab-sara" class="tab" onclick="chooseTeacher('sara')">שרה</button></div><input id="password" type="password" placeholder="סיסמת מורה"><div id="err" class="err">סיסמה לא תקינה</div><button class="primary" style="width:100%" onclick="doLogin()">כניסה</button><p style="font-size:13px;color:#777">ברירת מחדל: ben2026 / sara2026, אלא אם הוגדרו משתני סביבה.</p><p><a href="/">חזרה לתלמיד</a></p></div></section>
<header id="top" class="top"><b>EZRA</b><span id="who"></span><button class="logout" onclick="logout()">יציאה</button></header>
<main id="wrap" class="wrap"><div class="nav"><button class="active" onclick="showSection('settings',this)">הגדרות</button><button onclick="showSection('exercises',this)">תרגילים</button><button onclick="showSection('live',this)">תלמידים</button><button onclick="showSection('results',this)">תוצאות</button></div>
<section id="settings" class="section active"><div class="card"><h2>הגדרות כיתה</h2><label>Threshold: <b id="thresholdVal">85</b></label><input id="threshold" type="range" min="80" max="100" value="85" oninput="thresholdVal.textContent=this.value"><label>מספר ניסיונות: <b id="attemptsVal">5</b></label><input id="attempts" type="range" min="4" max="7" value="5" oninput="attemptsVal.textContent=this.value"><button class="primary" onclick="saveSettings()">שמור</button><span id="saveMsg" class="badge" style="display:none">נשמר</span></div></section>
<section id="exercises" class="section"><div class="card"><h2>בחירת תרגיל מהגוגל שיט</h2><input id="search" placeholder="חיפוש תרגיל" oninput="renderExercises()"><button class="ghost" onclick="loadCatalog()">רענן רשימה</button><p id="exCount"></p><div id="exList" class="list"><div class="item">טוען...</div></div></div></section>
<section id="live" class="section"><div class="card"><h2>תלמידים פעילים</h2><button class="ghost" onclick="loadStudents()">רענן</button><p id="activeExercise"></p><div id="students"></div></div></section>
<section id="results" class="section"><div class="card"><h2>תוצאות אחרונות</h2><button class="ghost" onclick="loadResults()">רענן</button><div id="resultsBody"></div></div></section></main>
<script>
var teacherId='ben', teacherPassword='', teachers={}, exercises=[], activeName='';
document.addEventListener('DOMContentLoaded',()=>{fetch('/api/teachers').then(r=>r.json()).then(d=>{teachers=d;chooseTeacher('ben')});document.getElementById('password').onkeydown=e=>{if(e.key==='Enter')doLogin()}});
function chooseTeacher(id){teacherId=id;let t=teachers[id]||{};document.documentElement.style.setProperty('--tc',t.color||'#4318D1');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));let tab=document.getElementById('tab-'+id);if(tab)tab.classList.add('active')}
function doLogin(){teacherPassword=document.getElementById('password').value;fetch('/api/teacher-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teacher_id:teacherId,password:teacherPassword})}).then(r=>{if(!r.ok)throw Error();return r.json()}).then(d=>{document.getElementById('login').style.display='none';document.getElementById('top').style.display='flex';document.getElementById('wrap').style.display='block';document.getElementById('who').textContent='מורה '+(teachers[teacherId]?.name||teacherId);document.getElementById('threshold').value=d.teacher.threshold;document.getElementById('thresholdVal').textContent=d.teacher.threshold;document.getElementById('attempts').value=d.teacher.max_attempts;document.getElementById('attemptsVal').textContent=d.teacher.max_attempts;loadCatalog();loadStudents();}).catch(()=>document.getElementById('err').style.display='block')}
function showSection(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(id==='live')loadStudents();if(id==='results')loadResults();if(id==='exercises'&&!exercises.length)loadCatalog()}
function api(path,obj){return fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({teacher_id:teacherId,password:teacherPassword},obj||{}))}).then(r=>r.json())}
function saveSettings(){api('/api/teacher-settings',{threshold:threshold.value,max_attempts:attempts.value}).then(d=>{saveMsg.style.display='inline-block';setTimeout(()=>saveMsg.style.display='none',1200)})}
function loadCatalog(){document.getElementById('exList').innerHTML='<div class="item">טוען...</div>';api('/api/catalog').then(d=>{exercises=d.exercises||[];renderExercises()})}
function renderExercises(){let q=(document.getElementById('search').value||'').toLowerCase();let list=exercises.filter(x=>x.name.toLowerCase().includes(q));document.getElementById('exCount').textContent=list.length+' תרגילים';document.getElementById('exList').innerHTML=list.map((x,i)=>'<div class="item"><b>'+esc(x.name)+'</b><button class="primary" onclick="selectExercise('+exercises.indexOf(x)+')">בחר</button></div>').join('')||'<div class="item">אין תרגילים</div>'}
function selectExercise(i){let x=exercises[i];api('/api/set-exercise',{name:x.name,csv_url:x.csv_url}).then(()=>{activeName=x.name;alert('נבחר: '+x.name);loadStudents()})}
function loadStudents(){api('/api/teacher-students').then(d=>{activeName=d.exercise||activeName;document.getElementById('activeExercise').textContent='תרגיל נוכחי: '+(activeName||'לא נבחר');let rows=d.students||[];document.getElementById('students').innerHTML=rows.map(s=>'<div class="item"><b>'+esc(s.name)+'</b><span class="badge">'+s.index+'/'+s.total+'</span><span class="badge">'+(s.done?'סיים':s.phase)+'</span></div>').join('')||'אין תלמידים פעילים'})}
function loadResults(){api('/api/teacher-results').then(d=>{let rows=d.rows||[];if(!rows.length){resultsBody.textContent='אין תוצאות עדיין';return}let keys=Object.keys(rows[0]);resultsBody.innerHTML='<table><thead><tr>'+keys.map(k=>'<th>'+esc(k)+'</th>').join('')+'</tr></thead><tbody>'+rows.slice().reverse().map(r=>'<tr>'+keys.map(k=>'<td>'+esc(r[k])+'</td>').join('')+'</tr>').join('')+'</tbody></table>'})}
function logout(){location.reload()}function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
</script></body></html>
