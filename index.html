<!-- v3 -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EZRA &#8212; Speech Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4ff;min-height:100vh;direction:rtl}

/* ── Teacher selection screen ─────────────────────────────────────── */
#select-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;background:linear-gradient(135deg,#1a1033 0%,#4318D1 100%);
}
.select-logo{font-size:60px;margin-bottom:8px}
.select-title{font-size:32px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-1px}
.select-sub{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:40px}
.teacher-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.teacher-card{
  width:180px;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);
  border-radius:24px;padding:28px 20px;cursor:pointer;transition:.25s;text-align:center;
  backdrop-filter:blur(8px);
}
.teacher-card:hover{transform:translateY(-6px);border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.2)}
.tc-avatar{width:90px;height:90px;border-radius:50%;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;font-size:42px;
  background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);
  transition:.25s;position:relative;overflow:hidden}
.tc-name{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.tc-role{font-size:12px;color:rgba(255,255,255,.6)}

/* ── Login overlay ────────────────────────────────────────────────── */
#login-overlay{
  display:none;position:fixed;inset:0;background:rgba(10,6,30,.75);
  z-index:100;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
#login-overlay.visible{display:flex}
.login-box{
  background:#fff;border-radius:24px;padding:32px 28px;width:100%;max-width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.35);
}
.login-teacher-info{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.login-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:32px;flex-shrink:0}
.login-teacher-name{font-size:22px;font-weight:800}
.login-teacher-sub{font-size:13px;color:#888;margin-top:2px}
.login-input{
  width:100%;padding:12px 14px;border:2px solid #e0d9ff;border-radius:12px;
  font-size:15px;margin-bottom:12px;outline:none;direction:rtl;
  font-family:inherit;transition:.2s;
}
.login-input:focus{border-color:var(--tc)}
.login-btn{
  width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;
  color:#fff;cursor:pointer;transition:.2s;background:var(--tc);
}
.login-btn:hover{opacity:.88}
.login-error{
  display:none;background:#ffebee;border:2px solid #ef5350;border-radius:10px;
  padding:9px 13px;font-size:13px;color:#c62828;margin-bottom:10px;
}
.login-cancel{
  margin-top:12px;width:100%;padding:10px;border:none;background:none;
  color:#888;cursor:pointer;font-size:13px;font-family:inherit;
}
.login-cancel:hover{color:#333}

/* ── Main practice screen ─────────────────────────────────────────── */
#app-screen{display:none;min-height:100vh;flex-direction:column}
#app-screen.visible{display:flex}

header{
  display:flex;align-items:center;gap:14px;padding:14px 20px;
  background:var(--tc,#4318D1);color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15);
  position:sticky;top:0;z-index:10;
}
.h-logo{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px}
.h-title{font-size:18px;font-weight:800}
.h-sub{font-size:12px;opacity:.75}
.h-student{margin-right:auto;background:rgba(255,255,255,.18);border-radius:20px;
  padding:5px 12px;font-size:13px;font-weight:600}

/* Avatar area */
.avatar-area{
  display:flex;flex-direction:column;align-items:center;padding:20px 0 10px;
  background:linear-gradient(to bottom, var(--tc-light,#e8f0fe), #f5f4ff);
}
.avatar-ring{
  width:110px;height:110px;border-radius:50%;border:4px solid var(--tc,#4318D1);
  display:flex;align-items:center;justify-content:center;font-size:56px;
  background:#fff;position:relative;transition:.3s;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.avatar-ring.talking{
  animation:pulse-ring .6s ease-in-out infinite alternate;
  box-shadow:0 0 0 0 var(--tc,#4318D1);
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(67,24,209,.4),0 4px 20px rgba(0,0,0,.1)}
  100%{box-shadow:0 0 0 14px rgba(67,24,209,0),0 4px 20px rgba(0,0,0,.1)}
}
.avatar-wave{display:flex;gap:5px;height:28px;align-items:flex-end;margin-top:10px;opacity:0;transition:.3s}
.avatar-wave.active{opacity:1}
.av-bar{width:5px;border-radius:3px;background:var(--tc,#4318D1);animation:wave-bar .6s ease-in-out infinite alternate}
.av-bar:nth-child(2){animation-delay:.1s}
.av-bar:nth-child(3){animation-delay:.2s}
.av-bar:nth-child(4){animation-delay:.1s}
.av-bar:nth-child(5){animation-delay:.05s}
@keyframes wave-bar{
  0%{height:6px;opacity:.5}
  100%{height:22px;opacity:1}
}
.avatar-speech{
  margin-top:8px;background:#fff;border-radius:16px;padding:8px 16px;
  font-size:13px;color:#555;font-weight:500;opacity:0;transition:.3s;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.avatar-speech.visible{opacity:1}

/* Progress */
.progress-wrap{padding:14px 20px 0;background:#f5f4ff}
.progress-label{font-size:13px;color:#888;font-weight:600;margin-bottom:6px}
.progress-track{height:8px;background:#e0d9ff;border-radius:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--tc,#4318D1);border-radius:20px;transition:width .5s}

/* Main card */
.main-card{
  margin:16px;background:#fff;border-radius:20px;padding:20px;
  box-shadow:0 4px 20px rgba(67,24,209,.08);flex:1;
}

.hebrew-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--tc,#4318D1);font-weight:700;margin-bottom:6px;
}
.hebrew-text{
  font-size:26px;font-weight:800;color:#1a1033;line-height:1.3;
  margin-bottom:16px;min-height:36px;direction:rtl;text-align:right;
}
.english-ref{
  font-size:18px;color:#4318D1;font-weight:600;margin-bottom:16px;
  min-height:28px;opacity:0;transition:opacity .4s;direction:ltr;text-align:left;
}

/* Cloze banner */
.cloze-banner{
  display:none;background:linear-gradient(135deg,#ede7ff,#ddd6fe);
  border:2px solid #a78bfa;border-radius:14px;padding:14px 16px;margin-bottom:14px;
}
.cloze-banner h3{font-size:14px;font-weight:800;color:#4c1d95;margin-bottom:8px}
.cloze-sentence{
  font-size:15px;color:#1a1033;font-weight:600;direction:ltr;text-align:left;
  background:#fff;border-radius:8px;padding:8px 12px;
}

/* Mastery banner */
.mastery-banner{
  display:none;border-radius:14px;padding:14px 16px;margin-bottom:14px;
  border:2px solid #ddd6fe;background:linear-gradient(135deg,#ede7ff,#f5f3ff);
}
.mastery-banner.visible{display:block}
.mastery-banner h3{font-size:14px;font-weight:800;color:#4c1d95;margin-bottom:6px}
.mastery-msg{font-size:13px;color:#555;margin-bottom:10px}
.mastery-dots{display:flex;gap:8px;flex-wrap:wrap}
.m-dot{width:18px;height:18px;border-radius:50%;background:#e0d9ff;transition:.3s}
.m-dot.done{background:var(--tc,#4318D1)}
.m-dot.reset{background:#ef5350;transform:scale(.8)}

/* Mic button */
.mic-btn{
  width:72px;height:72px;border-radius:50%;border:none;
  background:var(--tc,#4318D1);cursor:pointer;display:flex;align-items:center;
  justify-content:center;margin:16px auto;transition:.25s;
  box-shadow:0 4px 16px rgba(67,24,209,.35);
}
.mic-btn:hover{transform:scale(1.07)}
.mic-btn.listening{background:#ef5350;animation:mic-pulse 1s ease-in-out infinite}
.mic-btn.mastery-active{box-shadow:0 0 0 4px rgba(67,24,209,.25)}
@keyframes mic-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,83,80,.4)}
  50%{box-shadow:0 0 0 14px rgba(239,83,80,0)}
}
.mic-label{text-align:center;font-size:13px;color:#888;font-weight:600;margin-bottom:4px}

/* Action buttons */
.btn-row{display:flex;gap:8px;margin-bottom:8px}
.btn{
  border:none;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.btn-p{background:var(--tc,#4318D1);color:#fff}
.btn-p:hover{opacity:.88}
.btn-ghost{background:#ede7ff;color:var(--tc,#4318D1)}
.btn-ghost:hover{background:#ddd6fe}
.btn-skip{background:#f0f0f0;color:#666;font-size:13px}
.btn-skip:hover{background:#e0e0e0}

/* Score / result */
.score-row{display:none;align-items:center;gap:10px;margin-bottom:10px}
.score-bar{flex:1;height:10px;background:#eee;border-radius:20px;overflow:hidden}
.score-fill{height:100%;border-radius:20px;transition:width .5s,background .5s}
.score-num{font-size:15px;font-weight:800;min-width:44px;text-align:left}

.spoken-box{
  font-size:14px;color:#555;background:#f5f4ff;border-radius:10px;
  padding:8px 12px;min-height:36px;margin-bottom:10px;direction:ltr;
  text-align:left;opacity:0;transition:opacity .3s;
}
.spoken-box.visible{opacity:1}

.word-feedback{display:none;margin-bottom:10px}
.word-feedback.visible{display:block}
.wl{display:flex;flex-wrap:wrap;gap:4px;direction:ltr}
.w{padding:4px 8px;border-radius:20px;font-size:13px;font-weight:600}
.w-correct{background:#e8f5e9;color:#2e7d32}
.w-wrong{background:#ffebee;color:#c62828;text-decoration:line-through}
.w-missing{background:#fff3e0;color:#e65100}

.result-banner{
  border-radius:14px;padding:14px 16px;margin-bottom:10px;display:none;
}
.result-banner.visible{display:block}
.result-banner.pass{background:#e8f5e9;border:2px solid #a5d6a7}
.result-banner.fail{background:#ffebee;border:2px solid #ef9a9a}
.result-icon{font-size:28px;margin-bottom:4px}
.result-title{font-size:16px;font-weight:800;color:#1a1033;margin-bottom:2px}
.result-sub{font-size:13px;color:#666}

/* Done card */
.done-card{display:none;margin:16px;background:#fff;border-radius:20px;padding:24px;
  box-shadow:0 4px 20px rgba(67,24,209,.08)}

/* Confetti */
#confetti-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:999;display:none;
}

/* Teacher badge on select screen */
.teacher-card.selected-anim{transform:scale(.96)}
</style>
</head>
<body>

<!-- ═══ Teacher selection screen ═══════════════════════════════════════════ -->
<div id="select-screen">
  <div class="select-logo">🎓</div>
  <div class="select-title">EZRA</div>
  <div class="select-sub">בחר את המורה שלך</div>
  <div class="teacher-cards" id="teacher-cards">
    <div class="teacher-card" id="tc-ben" onclick="selectTeacher('ben')">
      <div class="tc-avatar" style="background:#e8f0fe;border-color:#1a56db">&#x1F468;&#x200D;&#x1F3EB;</div>
      <div class="tc-name" id="tc-ben-name">&#x05D1;&#x05DF;</div>
      <div class="tc-role" style="color:rgba(255,255,255,.6)">&#x05DE;&#x05D5;&#x05E8;&#x05D4;</div>
    </div>
    <div class="teacher-card" id="tc-sara" onclick="selectTeacher('sara')">
      <div class="tc-avatar" style="background:#fce8f3;border-color:#be185d">&#x1F469;&#x200D;&#x1F3EB;</div>
      <div class="tc-name" id="tc-sara-name">&#x05E9;&#x05E8;&#x05D4;</div>
      <div class="tc-role" style="color:rgba(255,255,255,.6)">&#x05DE;&#x05D5;&#x05E8;&#x05D4;</div>
    </div>
  </div>
</div>

<!-- ═══ Login overlay ════════════════════════════════════════════════════════ -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-teacher-info">
      <div class="login-avatar" id="login-avatar" style="background:var(--tc-light,#e8f0fe)">
        <span id="login-avatar-emoji"></span>
      </div>
      <div>
        <div class="login-teacher-name" id="login-teacher-name"></div>
        <div class="login-teacher-sub">כנס שייך לשיעור</div>
      </div>
    </div>
    <input class="login-input" id="login-name" type="text"
      placeholder="שמך המלא" autocomplete="given-name">
    <input class="login-input" id="login-pass" type="password"
      placeholder="סיסמא (ניתן להשמיט אם אין)"
      autocomplete="current-password">
    <div class="login-error" id="login-error">שם או סיסמא שגויים — נסה שוב.</div>
    <button class="login-btn" onclick="submitLogin()">&#x05D4;&#x05EA;&#x05D7;&#x05DC; &#x05EA;&#x05E8;&#x05D2;&#x05D5;&#x05DC; &#x2190;</button>
    <button class="login-cancel" onclick="cancelLogin()">&#x05D7;&#x05D6;&#x05D5;&#x05E8;&#x05D4;</button>
  </div>
</div>

<!-- ═══ App (practice) screen ════════════════════════════════════════════════ -->
<div id="app-screen">

  <header>
    <div class="h-logo">E</div>
    <div>
      <div class="h-title">EZRA</div>
      <div class="h-sub" id="h-teacher-name"></div>
    </div>
    <div class="h-student" id="h-student-tag"></div>
  </header>

  <!-- Avatar area -->
  <div class="avatar-area">
    <div class="avatar-ring" id="avatar-ring">
      <span id="avatar-emoji"></span>
    </div>
    <div class="avatar-wave" id="avatar-wave">
      <div class="av-bar" style="height:8px"></div>
      <div class="av-bar" style="height:14px"></div>
      <div class="av-bar" style="height:20px"></div>
      <div class="av-bar" style="height:14px"></div>
      <div class="av-bar" style="height:8px"></div>
    </div>
    <div class="avatar-speech" id="avatar-speech"></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label" id="prog-label">-</div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- Main card -->
  <div class="main-card" id="main-card">
    <div class="hebrew-label">משפט לתרגום</div>
    <div class="hebrew-text" id="hebrew"></div>

    <div class="cloze-banner" id="cloze-banner">
      <h3>🧩 חסרה מילה במשפט</h3>
      <div class="cloze-sentence" id="cloze-sentence"></div>
      <div style="font-size:12px;color:#7c3aed;margin-top:6px" id="cloze-msg"></div>
    </div>

    <div class="mastery-banner" id="mastery-banner">
      <h3 id="mastery-h3">⭐ מצב שליטה — Benjamin Bloom</h3>
      <div class="mastery-msg" id="mastery-msg"></div>
      <div class="mastery-dots" id="mastery-dots"></div>
    </div>

    <div class="english-ref" id="english-ref"></div>

    <div class="score-row" id="score-row">
      <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
      <div class="score-num" id="score-num">-</div>
    </div>

    <div class="spoken-box" id="spoken-box"></div>

    <div class="word-feedback" id="word-feedback">
      <div class="wl" id="word-list"></div>
    </div>

    <div class="result-banner" id="result-banner">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>

    <button class="mic-btn" id="mic-btn" onclick="startRecognition()">
      <svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:white">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.03 2.93 5.37 5.91 5.82V20c0 .55.45 1 1 1s1-.45 1-1v-2.04c2.98-.45 5.42-2.79 5.91-5.82.1-.6-.39-1.14-1-1.14z"/>
      </svg>
    </button>
    <div class="mic-label" id="mic-label">הקש לדיבור</div>

    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-p" id="play-btn" onclick="playSentence()">🔊 השמע</button>
      <button class="btn btn-ghost" id="show-btn" onclick="revealEnglish()">👁 הצג אנגלית</button>
      <button class="btn btn-skip" onclick="skipSentence()">דלג</button>
    </div>
  </div>

  <!-- Done card -->
  <div class="done-card" id="done-card"></div>

</div><!-- /#app-screen -->

<canvas id="confetti-canvas"></canvas>

<script>
// ══ State ══════════════════════════════════════════════════════════════════
var teacherData    = {};     // {ben:{name,color,color_light,...}, ...}
var currentTeacher = null;   // "ben" | "sara"
var studentName    = "";
var studentId      = "";
var currentQ       = null;
var waiting        = false;
var processing     = false;
var examMode       = false;
var examIndex      = 0;
var examSentences  = [];
var examResults    = [];
var practiceResults= [];
var questionMap    = {};     // en -> he

// ══ Boot ═══════════════════════════════════════════════════════════════════
// Fetch teacher data and update cards with real colors/names from API
fetch("/api/teachers")
  .then(function(r){ return r.json(); })
  .then(function(data){
    teacherData = data;
    updateTeacherCards(data);
  })
  .catch(function(e){ console.warn("Could not load teacher data:", e); });

// ══ Teacher selection ═══════════════════════════════════════════════════════
var TEACHER_EMOJIS = {ben: "👨‍🏫", sara: "👩‍🏫"};

window.updateTeacherCards = function updateTeacherCards(data) {
  // Update existing static cards with real data from API
  Object.keys(data).forEach(function(tid){
    var t = data[tid];
    var card = document.getElementById("tc-" + tid);
    if (!card) return;
    var avatar = card.querySelector(".tc-avatar");
    var nameEl = card.querySelector(".tc-name");
    if (avatar) { avatar.style.background = t.color_light; avatar.style.borderColor = t.color; }
    if (nameEl) nameEl.textContent = t.name;
  });
}

window.selectTeacher = function selectTeacher(tid) {
  currentTeacher = tid;
  var t = teacherData[tid] || {};
  var color = t.color || "#4318D1";
  var colorLight = t.color_light || "#e8f0fe";
  var name  = t.name  || tid;
  var emoji = TEACHER_EMOJIS[tid] || "👨‍🏫";

  // Set CSS vars for login box
  document.documentElement.style.setProperty("--tc", color);
  document.documentElement.style.setProperty("--tc-light", colorLight);

  document.getElementById("login-avatar-emoji").textContent = emoji;
  document.getElementById("login-avatar").style.background = colorLight;
  document.getElementById("login-teacher-name").textContent = name;
  document.getElementById("login-name").value = "";
  document.getElementById("login-pass").value = "";
  document.getElementById("login-error").style.display = "none";
  document.getElementById("login-overlay").classList.add("visible");
  setTimeout(function(){ document.getElementById("login-name").focus(); }, 200);
}

window.cancelLogin = function cancelLogin() {
  document.getElementById("login-overlay").classList.remove("visible");
  currentTeacher = null;
}

window.submitLogin = function submitLogin() {
  var name = document.getElementById("login-name").value.trim();
  var pass = document.getElementById("login-pass").value;
  if (!name) { document.getElementById("login-name").focus(); return; }

  var errBox = document.getElementById("login-error");
  errBox.style.display = "none";

  fetch("/api/verify-student", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({teacher_id: currentTeacher, name: name, password: pass})
  }).then(function(r){
    if (r.ok) return r.json();
    throw new Error("auth");
  }).then(function(d){
    studentName = name;
    studentId   = d.student_id;
    startApp();
  }).catch(function(){
    errBox.style.display = "block";
    document.getElementById("login-pass").value = "";
    document.getElementById("login-pass").focus();
  });
}

document.getElementById("login-name").addEventListener("keydown", function(e){
  if (e.key === "Enter") document.getElementById("login-pass").focus();
});
document.getElementById("login-pass").addEventListener("keydown", function(e){
  if (e.key === "Enter") submitLogin();
});

// ══ Start app ══════════════════════════════════════════════════════════════
window.startApp = function startApp() {
  var t = teacherData[currentTeacher] || {};
  var color = t.color || "#4318D1";
  var colorLight = t.color_light || "#e8f0fe";
  var emoji = TEACHER_EMOJIS[currentTeacher] || "👨‍🏫";
  currentVoiceGender = t.voice_gender || "female";

  document.documentElement.style.setProperty("--tc", color);
  document.documentElement.style.setProperty("--tc-light", colorLight);

  document.getElementById("h-teacher-name").textContent = t.name || currentTeacher;
  document.getElementById("h-student-tag").textContent = "👤 " + studentName;
  document.getElementById("avatar-emoji").textContent = emoji;

  document.getElementById("login-overlay").classList.remove("visible");
  document.getElementById("select-screen").style.display = "none";
  document.getElementById("app-screen").classList.add("visible");

  loadQuestion();
}

// ══ Voice ══════════════════════════════════════════════════════════════════
var currentVoiceGender = "female"; // default; updated when teacher is chosen

function getVoice() {
  var voices = speechSynthesis.getVoices().filter(function(v){
    return v.lang.startsWith("en");
  });
  if (!voices.length) return null;

  var wantFemale = (currentVoiceGender !== "male");
  // Try to match gender by common voice-name keywords
  var femaleKw = ["female","woman","zira","samantha","victoria","karen","moira","tessa","fiona","veena","kate"];
  var maleKw   = ["male","man","david","mark","daniel","alex","fred","lee","rishi","thomas"];
  var keywords  = wantFemale ? femaleKw : maleKw;
  var matched = voices.filter(function(v){
    var n = v.name.toLowerCase();
    return keywords.some(function(k){ return n.indexOf(k) !== -1; });
  });
  return matched.length ? matched[0] : voices[0];
}
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = function(){ speechSynthesis.getVoices(); };
}

// ══ Avatar talking animation ════════════════════════════════════════════════
function avatarStartTalking(text) {
  document.getElementById("avatar-ring").classList.add("talking");
  document.getElementById("avatar-wave").classList.add("active");
  var sp = document.getElementById("avatar-speech");
  sp.textContent = text || "מקריא את המשפט...";
  sp.classList.add("visible");
}
function avatarStopTalking() {
  document.getElementById("avatar-ring").classList.remove("talking");
  document.getElementById("avatar-wave").classList.remove("active");
  document.getElementById("avatar-speech").classList.remove("visible");
}

// ══ Load question ══════════════════════════════════════════════════════════
function loadQuestion() {
  resetUI();
  fetch("/api/question?student=" + encodeURIComponent(studentId))
    .then(function(r){ return r.json(); })
    .then(function(q){
      if (q.done) {
        practiceResults = q.results || [];
        startExamMode(practiceResults);
        return;
      }
      currentQ = q;
      if (q.he) questionMap[q.en] = q.he;
      document.getElementById("hebrew").textContent = q.he;
      document.getElementById("english-ref").textContent = q.en;
      document.getElementById("prog-label").textContent =
        "משפט " + (q.index + 1) + " מתוך " + q.total;
      document.getElementById("prog-fill").style.width =
        Math.round((q.index / q.total) * 100) + "%";

      if (q.phase === "mastery" || q.mastery_target > 0) {
        showMasteryBanner(q.mastery_consecutive || 0, q.mastery_target, false);
        document.getElementById("english-ref").style.opacity = "1";
      } else if (q.phase === "cloze" && q.cloze_word) {
        showClozeBanner(q.cloze_word, 3);
      } else {
        setTimeout(playSentence, 400);
      }
    })
    .catch(function(e){
      document.getElementById("hebrew").textContent = "שגיאה: " + e.message;
    });
}

// ══ Play sentence ══════════════════════════════════════════════════════════
window.playSentence = function playSentence() {
  if (!currentQ) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(currentQ.en);
  u.lang = "en-US"; u.rate = 0.88;
  var v = getVoice();
  if (v) u.voice = v;
  avatarStartTalking(currentQ.en);
  u.onend = avatarStopTalking;
  u.onerror = avatarStopTalking;
  speechSynthesis.speak(u);
}

window.revealEnglish = function revealEnglish() {
  var el = document.getElementById("english-ref");
  el.style.opacity = el.style.opacity === "1" ? "0" : "1";
}

window.skipSentence = function skipSentence() {
  if (waiting || processing) return;
  waiting = true;
  fetch("/api/skip", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({student: studentId})
  }).then(function(){
    waiting = false;
    loadQuestion();
  });
}

// ══ Cloze banner ════════════════════════════════════════════════════════════
function showClozeBanner(clozeWord, attemptsLeft) {
  if (!currentQ) return;
  var banner  = document.getElementById("cloze-banner");
  var msg     = document.getElementById("cloze-msg");
  var sentEl  = document.getElementById("cloze-sentence");

  var words   = currentQ.en.split(" ");
  var blanked = words.map(function(w){
    return w.toLowerCase().replace(/[^a-z]/g,"") === clozeWord ? "______" : w;
  }).join(" ");

  sentEl.textContent = blanked;
  msg.textContent    = "אנא אמור את המשפט השלם כולל המילה החסרה (ניסיון " + (4 - attemptsLeft) + "/3)";

  banner.style.display = "block";
  document.getElementById("english-ref").style.opacity = "0";
  document.getElementById("play-btn").style.display = "none";
  document.getElementById("show-btn").style.display = "none";
  document.getElementById("mic-btn").style.background = "#0284c7";

function hideCloze() {
  document.getElementById("cloze-banner").style.display = "none";

  document.getElementById("play-btn").style.display = "";

// ══ Mastery banner ══════════════════════════════════════════════════════════
function showMasteryBanner(consecutive, target, broken) {
  var banner = document.getElementById("mastery-banner");
  var msg    = document.getElementById("mastery-msg");
  var dots   = document.getElementById("mastery-dots");
  var h3     = document.getElementById("mastery-h3");

  banner.className = "mastery-banner visible";
  if (broken) {
    h3.textContent  = "⭐ הרצף נשבר!";
    msg.textContent = "התחל מחדש — אמור נכון " + target + " פעמים ברצף.";
  } else {
    h3.textContent  = "⭐ מצב שליטה — Benjamin Bloom";
    var remaining   = target - consecutive;
    msg.textContent = consecutive > 0
      ? "🔥 רצף: " + consecutive + "/" + target + " — " +
        (remaining === 1 ? "עוד אחת!" : "עוד " + remaining + " ברצף.")
      : "אמור נכון " + target + " פעמים ברצף.";
  }

  dots.innerHTML = "";
  for (var i = 0; i < target; i++) {
    var d = document.createElement("div");
    d.className = "m-dot" + (broken ? " reset" : (i < consecutive ? " done" : ""));
    dots.appendChild(d);
  }
  document.getElementById("mic-btn").classList.add("mastery-active");
}

function hideMasteryBanner() {
  document.getElementById("mastery-banner").className = "mastery-banner";
  document.getElementById("mic-btn").classList.remove("mastery-active");
}

// ══ Messages ════════════════════════════════════════════════════════════════
var MSG_PASS    = ["מצוין! 🎉","כל הכבוד! ⭐","מדהים! 🚀","מושלם! 🏆","יפה מאוד! 💫","נהדר! 🎯"];
var MSG_FAIL    = ["כמעט! נסה שוב 💪","אתה יכול! 🌟","עוד קצת! 😊","חזק! 💎","הכוח בך! 🦁"];
var MSG_MASTERY = ["הרגל נבנה! 🧠","מאסטר! 🎓","Bloom would be proud! 🏆","מושלם! 🌈"];
var MSG_STREAK  = ["Keep the streak! 🔥","Unstoppable! ⚡","ממשיך לנצח! 💪"];
var MSG_BROKEN  = ["נסה שוב 💙","אתה קרוב! 🌟","חזרה לדרך! 💪"];
var MSG_SKIP    = ["ננסה בפעם הבאה 🤝","נמשיך קדימה 💙","נחזור לזה בהמשך 🔄"];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// ══ Speech recognition ══════════════════════════════════════════════════════
window.startRecognition = function startRecognition() {
  if (waiting || processing) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert("זיהוי קול אינו נתמך — יש להשתמש ב-Chrome.");
    return;
  }
  processing = true;
  var rec      = new SR();
  var micBtn   = document.getElementById("mic-btn");
  var micLabel = document.getElementById("mic-label");
  var spokenBox= document.getElementById("spoken-box");

  rec.lang = "en-US"; rec.continuous = true; rec.interimResults = false;

  var finalText = "", submitted = false, silenceTimer = null;
  spokenBox.textContent = "";
  micBtn.classList.add("listening");
  micLabel.textContent = "מקשיב...";

  rec.onresult = function(event) {
    var interim = "", cf = "";
    for (var i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) cf += event.results[i][0].transcript + " ";
      else interim += event.results[i][0].transcript;
    }
    if (cf.trim()) finalText = cf.trim();
    spokenBox.textContent = (finalText + " " + interim).trim();
    spokenBox.classList.add("visible");
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(function(){ if (!submitted) rec.stop(); }, 1500);
  };

  rec.onend = function() {
    micBtn.classList.remove("listening");
    if (submitted) return;
    submitted = true;
    if (silenceTimer) clearTimeout(silenceTimer);
    var text = finalText.trim();
    if (!text) {
      processing = false;
      micLabel.textContent = "הקש לדיבור";
      spokenBox.classList.remove("visible");
      return;
    }
    micLabel.textContent = "מעבד...";
    spokenBox.textContent = "אמרת: " + text;

    fetch("/api/answer", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({student: studentId, answer: text})
    })
    .then(function(r){ return r.json(); })
    .then(function(result){ processing = false; showResult(result); })
    .catch(function(){ processing = false; micLabel.textContent = "שגיאה — נסה שוב"; });
  };

  rec.onerror = function() {
    processing = false; submitted = true;
    micBtn.classList.remove("listening");
    micLabel.textContent = "שגיאה — נסה שוב";
  };
  rec.start();
}

// ══ Show result ═════════════════════════════════════════════════════════════
function showResult(result) {
  var score  = result.score;
  var passed = result.passed;
  var color  = score >= 85 ? "#4CAF50" : score >= 60 ? "#FF9800" : "#ef5350";

  var scoreRow = document.getElementById("score-row");
  scoreRow.style.display = "flex";
  document.getElementById("score-fill").style.background = color;
  document.getElementById("score-fill").style.width  = score + "%";
  document.getElementById("score-num").textContent   = score + "%";
  document.getElementById("score-num").style.color   = color;

  var wfEl = document.getElementById("word-feedback");
  var wlEl = document.getElementById("word-list");
  wfEl.classList.add("visible");
  var html = "";
  for (var i = 0; i < (result.words || []).length; i++) {
    var w   = result.words[i];
    var cls = w.status === "correct" ? "w-correct" : w.status === "wrong" ? "w-wrong" : "w-missing";
    html += '<span class="w ' + cls + '">' + w.word + '</span> ';
  }
  wlEl.innerHTML = html;

  var banner = document.getElementById("result-banner");
  var icon   = document.getElementById("result-icon");
  var title  = document.getElementById("result-title");
  var sub    = document.getElementById("result-sub");

  // Skipped
  if (result.skipped) {
    hideCloze(); hideMasteryBanner();
    banner.className = "result-banner visible fail";
    icon.textContent  = "🤝";
    title.textContent = pick(MSG_SKIP);
    sub.textContent   = "עוברים למשפט הבא...";
    waiting = true;
    setTimeout(function(){ waiting = false; loadQuestion(); }, 2000);
    return;
  }

  // Cloze mode
  if (result.cloze_mode === true) {
    hideMasteryBanner();
    if (result.cloze_done) {
      hideCloze();
      banner.className  = "result-banner visible pass";
      icon.textContent  = "🧩";
      title.textContent = "השלמת את המשפט! " + pick(MSG_PASS);
      sub.textContent   = result.mastery_mode
        ? "עכשיו לבנות הרגל — " + result.mastery_target + " פעמים ברצף"
        : "עוברים למשפט הבא...";
      if (result.mastery_mode) {
        showMasteryBanner(result.mastery_consecutive || 0, result.mastery_target, false);
        document.getElementById("mic-label").textContent = "הקש לדיבור";
        document.getElementById("english-ref").style.opacity = "1";
      }
      if (result.advance) {
        launchConfetti(); waiting = true;
        setTimeout(function(){ waiting = false; loadQuestion(); }, 2000);
      }
    } else {
      // Still in cloze
      showClozeBanner(result.cloze_word, result.cloze_attempts_left || 0);
      banner.className  = "result-banner visible fail";
      icon.textContent  = "🧩";
      title.textContent = "חסרה מילה — " + pick(MSG_FAIL);
      sub.textContent   = "ציון " + score + "% — אנא אמור שוב עם המילה החסרה";
      document.getElementById("mic-label").textContent = "אמור את המשפט השלם";
    }
    return;
  }

  // Mastery mode
  if (result.mastery_mode) {
    hideCloze();
    document.getElementById("english-ref").style.opacity = "1";
    var consecutive = result.mastery_consecutive || 0;
    var target      = result.mastery_target      || 0;
    var broken      = result.streak_broken       || false;

    if (result.first_pass) {
      banner.className  = "result-banner visible pass";
      icon.textContent  = "🌟";
      title.textContent = pick(MSG_PASS) + " עכשיו לבנות הרגל!";
      sub.textContent   = "אמור נכון " + target + " פעמים ברצף.";
    } else if (broken) {
      banner.className  = "result-banner visible fail";
      icon.textContent  = "💙";
      title.textContent = pick(MSG_BROKEN);
      sub.textContent   = "ציון " + score + "% — התחל רצף מחדש.";
    } else if (passed) {
      banner.className  = "result-banner visible pass";
      icon.textContent  = "🔥";
      title.textContent = consecutive + "/" + target + " ברצף! " + pick(MSG_STREAK);
      sub.textContent   = "עוד " + (target - consecutive) + " פעמים ברצף.";
      if (consecutive >= 2) launchConfetti();
    }

    showMasteryBanner(consecutive, target, broken);

    if (result.advance) {
      launchConfetti(); hideMasteryBanner();
      banner.className  = "result-banner visible pass";
      icon.textContent  = "🏆";
      title.textContent = pick(MSG_MASTERY);
      sub.textContent   = "עוברים למשפט הבא...";
      waiting = true;
      setTimeout(function(){ waiting = false; loadQuestion(); }, 2200);
    } else {
      document.getElementById("mic-label").textContent =
        broken ? "הקש — התחל רצף מחדש" : "הקש לדיבור";
    }
    return;
  }

  // Normal mode — first pass (enter cloze)
  if (result.cloze_mode === null && result.cloze_word) {
    showClozeBanner(result.cloze_word, 3);
    banner.className  = "result-banner visible pass";
    icon.textContent  = "🌟";
    title.textContent = pick(MSG_PASS) + " — עכשיו השלם מילה חסרה";
    sub.textContent   = "אנא אמור את המשפט השלם כולל המילה החסרה";
    document.getElementById("english-ref").style.opacity = "1";
    return;
  }

  // Normal mode — failed
  hideCloze();
  if (passed) {
    launchConfetti();
    banner.className  = "result-banner visible pass";
    icon.textContent  = "🎉";
    title.textContent = pick(MSG_PASS);
    sub.textContent   = "ציון: " + score + "% — עוברים הלאה...";
  } else {
    banner.className  = "result-banner visible fail";
    icon.textContent  = "💪";
    title.textContent = pick(MSG_FAIL);
    sub.textContent   = "ציון: " + score + "% — צריך " + (result.threshold || 85) + "% לעבור.";
  }
  document.getElementById("mic-label").textContent =
    passed ? "עוברים..." : "הקש לנסות שוב";

  if (result.advance) {
    waiting = true;
    document.getElementById("english-ref").style.opacity = "1";
    setTimeout(function(){ waiting = false; loadQuestion(); }, 2000);
  }
}

// ══ EXAM MODE ═══════════════════════════════════════════════════════════════
function startExamMode(practiceData) {
  examSentences = practiceData
    .filter(function(r){ return !r.skipped; })
    .map(function(r){ return { he: questionMap[r.sentence] || null, en: r.sentence }; });

  if (!examSentences.length) { showFinalReport(practiceData, []); return; }

  examMode  = true; examIndex = 0; examResults = [];
  document.getElementById("main-card").style.display = "block";
  document.getElementById("done-card").style.display = "none";
  document.getElementById("main-card").innerHTML = buildExamIntroHTML(examSentences.length);
}

function buildExamIntroHTML(count) {
  return '<div style="text-align:center;padding:20px 0">' +
    '<div style="font-size:52px;margin-bottom:12px">🎓</div>' +
    '<h2 style="font-size:22px;font-weight:800;color:var(--tc,#4318D1);margin-bottom:10px">מבחן סיכום</h2>' +
    '<p style="font-size:15px;color:#555;margin-bottom:8px">תאמר את ' + count + ' המשפטים שלמדת.</p>' +
    '<p style="font-size:13px;color:#888;margin-bottom:28px">לא תקבל פידבק תוך כדי — רק ניתוח מלא בסוף.</p>' +
    '<button class="btn btn-p" style="width:100%;padding:14px;font-size:16px" ' +
      'onclick="runExamQuestion()">התחל מבחן ←</button></div>';
}

function runExamQuestion() {
  if (examIndex >= examSentences.length) {
    examMode = false; showFinalReport(practiceResults, examResults); return;
  }
  var q     = examSentences[examIndex];
  var total = examSentences.length;
  var pct   = Math.round((examIndex / total) * 100);

  document.getElementById("main-card").innerHTML =
    '<div id="exam-wrap">' +
      '<div style="font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">מבחן — משפט ' + (examIndex+1) + ' מתוך ' + total + '</div>' +
      '<div style="background:#ddd;border-radius:20px;height:6px;margin-bottom:18px">' +
        '<div style="background:var(--tc,#4318D1);height:6px;border-radius:20px;width:' + pct + '%;transition:width .4s"></div></div>' +
      '<div class="hebrew-label">תרגם לאנגלית:</div>' +
      '<div class="hebrew-text" id="exam-he" style="direction:rtl;text-align:right">' + (q.he || "—") + '</div>' +
      '<div id="exam-spoken" style="font-size:14px;color:#888;min-height:22px;margin:10px 0"></div>' +
      '<button class="mic-btn" id="exam-mic" onclick="startExamRecognition()" style="margin:0 auto 10px">' +
        '<svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.03 2.93 5.37 5.91 5.82V20c0 .55.45 1 1 1s1-.45 1-1v-2.04c2.98-.45 5.42-2.79 5.91-5.82.1-.6-.39-1.14-1-1.14z"/></svg>' +
      '</button>' +
      '<div id="exam-label" style="text-align:center;font-size:13px;color:#888;font-weight:600;margin-bottom:4px">הקש לדיבור</div>' +
      '<button class="btn btn-skip" style="width:100%;margin-top:10px" onclick="skipExamQuestion()">דלג על משפט זה</button>' +
    '</div>';
}

function startExamRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  var micBtn   = document.getElementById("exam-mic");
  var label    = document.getElementById("exam-label");
  var spokenEl = document.getElementById("exam-spoken");
  var rec      = new SR();
  rec.lang = "en-US"; rec.continuous = true; rec.interimResults = false;

  var finalText = "", submitted = false, silenceTimer = null;
  micBtn.classList.add("listening");
  label.textContent = "מקשיב...";

  rec.onresult = function(event) {
    var cf = "";
    for (var i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) cf += event.results[i][0].transcript + " ";
    }
    if (cf.trim()) finalText = cf.trim();
    spokenEl.textContent = finalText;
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(function(){ if (!submitted) rec.stop(); }, 1500);
  };

  rec.onend = function() {
    micBtn.classList.remove("listening");
    if (submitted) return;
    submitted = true;
    if (!finalText.trim()) { label.textContent = "הקש לדיבור"; return; }
    label.textContent = "שומר...";
    var correct = examSentences[examIndex].en;
    fetch("/api/score-only", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({spoken: finalText.trim(), correct: correct, teacher_id: currentTeacher})
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      examResults.push({sentence: correct, score: res.score, passed: res.passed, spoken: finalText.trim()});
      examIndex++;
      setTimeout(runExamQuestion, 400);
    })
    .catch(function(){ label.textContent = "שגיאה — נסה שוב"; });
  };

  rec.onerror = function() {
    micBtn.classList.remove("listening");
    label.textContent = "שגיאה"; submitted = true;
  };
  rec.start();
}

function skipExamQuestion() {
  examResults.push({sentence: examSentences[examIndex].en, score:0, passed:false, skipped:true});
  examIndex++;
  runExamQuestion();
}

// ══ Final report ════════════════════════════════════════════════════════════
function showFinalReport(practiceData, examData) {
  document.getElementById("main-card").style.display = "none";
  var done = document.getElementById("done-card");
  done.style.display = "block";

  function statBox(label, val, color) {
    return '<div style="background:#ede7ff;border-radius:14px;padding:14px 20px;min-width:90px">' +
      '<div style="font-size:28px;font-weight:800;color:'+(color||"var(--tc,#4318D1)")+'">'+val+'</div>' +
      '<div style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;margin-top:2px">'+label+'</div></div>';
  }

  function sentenceRow(r) {
    var sc  = r.score || 0;
    var rc  = sc >= 85 ? "#4CAF50" : sc >= 60 ? "#FF9800" : "#ef5350";
    var ico = r.skipped ? "⏭" : (r.passed ? "✓" : "✗");
    var ibg = r.skipped ? "#f0f0f0" : (r.passed ? "#e8f5e9" : "#ffebee");
    var ifc = r.skipped ? "#888"    : (r.passed ? "#2e7d32" : "#c62828");
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:10px;background:#f8f7ff;border-left:5px solid '+rc+';margin-bottom:8px">' +
      '<span style="font-size:14px;font-weight:800;color:'+ifc+';background:'+ibg+';width:28px;height:28px;border-radius:50%;display:grid;place-items:center">'+ico+'</span>' +
      '<span style="flex:1;font-size:13px;color:#1a1033">'+r.sentence+'</span>' +
      (r.skipped
        ? '<span style="font-size:11px;color:#888">דולג</span>'
        : '<span style="font-size:12px;font-weight:700;color:#fff;background:'+rc+';padding:3px 10px;border-radius:20px">'+sc+'%</span>'
      ) + '</div>';
  }

  var pTotal  = practiceData.length;
  var pPassed = practiceData.filter(function(r){ return r.passed && !r.skipped; }).length;
  var pAvg    = pTotal ? Math.round(practiceData.reduce(function(a,r){ return a+(r.score||0); },0)/pTotal) : 0;
  var eTotal  = examData.length;
  var ePassed = examData.filter(function(r){ return r.passed; }).length;
  var eAvg    = eTotal ? Math.round(examData.reduce(function(a,r){ return a+(r.score||0); },0)/eTotal) : 0;
  var eColor  = eAvg >= 85 ? "#4CAF50" : eAvg >= 60 ? "#FF9800" : "#ef5350";

  done.innerHTML =
    '<div style="text-align:center;padding:8px 0 16px">' +
      '<div style="font-size:48px;margin-bottom:8px">🎓</div>' +
      '<h2 style="font-size:24px;font-weight:800;color:var(--tc,#4318D1);margin-bottom:4px">סיום סשן — '+studentName+'</h2>' +
      '<p style="font-size:13px;color:#888;margin-bottom:20px">תרגול + מבחן</p>' +

      '<h3 style="font-size:14px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:10px">תרגול</h3>' +
      '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap">' +
        statBox("עברו", pPassed+"/"+pTotal) +
        statBox("ממוצע", pAvg+"%") +
      '</div>' +
      '<div style="text-align:right;margin-bottom:24px">'+practiceData.map(sentenceRow).join("")+'</div>' +

      (eTotal ? (
        '<h3 style="font-size:14px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:10px">מבחן סיכום</h3>' +
        '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap">' +
          statBox("עברו", ePassed+"/"+eTotal) +
          statBox("ממוצע", eAvg+"%", eColor) +
        '</div>' +
        '<div style="text-align:right;margin-bottom:24px">'+examData.map(sentenceRow).join("")+'</div>'
      ) : "") +

      '<button class="btn btn-p" style="width:100%;padding:13px;font-size:16px" ' +
        'onclick="resetSession()">🔄 התחל מחדש</button>' +
    '</div>';

  launchConfetti();
}

// ══ Confetti ════════════════════════════════════════════════════════════════
function launchConfetti() {
  var canvas = document.getElementById("confetti-canvas");
  var ctx    = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.display = "block";
  var colors = ["var(--tc,#4318D1)","#7c3aed","#4CAF50","#FF9800","#FFC107","#2196F3","#ef5350"];
  var pieces = [];
  for (var i = 0; i < 140; i++) {
    pieces.push({
      x:Math.random()*canvas.width, y:Math.random()*-canvas.height*.5,
      w:Math.random()*11+5, h:Math.random()*6+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360, vx:(Math.random()-.5)*3,
      vy:Math.random()*4+2, vr:(Math.random()-.5)*9
    });
  }
  var ticks = 0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var alive = false;
    for (var j = 0; j < pieces.length; j++) {
      var p = pieces[j];
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      if (p.y < canvas.height) alive = true;
      ctx.save(); ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
    ticks++;
    if (alive && ticks < 220) requestAnimationFrame(draw);
    else { canvas.style.display = "none"; ctx.clearRect(0,0,canvas.width,canvas.height); }
  })();
}
